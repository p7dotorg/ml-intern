<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" fill="url(#grad)" rx="24"/>

  <!-- Sigma symbol (∑) -->
  <text x="64" y="85" font-size="72" font-weight="bold" fill="white" text-anchor="middle" font-family="Georgia, serif">∑</text>

  <!-- Optional: Small X (for "explain") -->
  <g opacity="0.9">
    <circle cx="96" cy="32" r="16" fill="rgba(255,255,255,0.3)"/>
    <text x="96" y="39" font-size="20" fill="white" text-anchor="middle" font-weight="bold">?</text>
  </g>
</svg>
